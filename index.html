<script>
  const params = new URLSearchParams(window.location.search);
  const garmentImage = params.get('image') || '';
  const productUrl = params.get('product_url') || '#';
  const title = params.get('title') || 'عباية';

  let galleryImages = [];
  try {
    galleryImages = JSON.parse(params.get('images') || '[]');
  } catch (e) {
    galleryImages = [];
  }

  if (!galleryImages.length && garmentImage) {
    galleryImages = [garmentImage];
  }

  let selectedGarmentImage = garmentImage || galleryImages[0] || '';

  const garmentPreview = document.getElementById('garmentPreview');
  const productTitle = document.getElementById('product-title');
  const buyLink = document.getElementById('buyLink');
  const runBtn = document.getElementById('runBtn');
  const statusEl = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');
  const resultImage = document.getElementById('resultImage');
  const gallery = document.getElementById('gallery');

  garmentPreview.src = selectedGarmentImage;
  productTitle.textContent = title;
  buyLink.href = productUrl;

  function renderGallery(images) {
    gallery.innerHTML = '';

    images.forEach((src) => {
      const thumb = document.createElement('img');
      thumb.src = src;
      thumb.alt = 'صورة منتج';
      thumb.style.width = '72px';
      thumb.style.height = '72px';
      thumb.style.objectFit = 'cover';
      thumb.style.borderRadius = '10px';
      thumb.style.cursor = 'pointer';
      thumb.style.border = src === selectedGarmentImage ? '2px solid #111' : '1px solid #ddd';

      thumb.addEventListener('click', () => {
        selectedGarmentImage = src;
        garmentPreview.src = src;
        renderGallery(images);
      });

      gallery.appendChild(thumb);
    });
  }

  renderGallery(galleryImages);

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  runBtn.addEventListener('click', async () => {
    const file = document.getElementById('personImage').files[0];
    const consent = document.getElementById('consent').checked;

    if (!selectedGarmentImage) {
      alert('اختاري صورة المنتج أولًا');
      return;
    }

    if (!file) {
      alert('ارفعي صورتك أولًا');
      return;
    }

    if (!consent) {
      alert('يجب الموافقة على استخدام الصورة');
      return;
    }

    runBtn.disabled = true;
    statusEl.textContent = 'جاري إنشاء المعاينة... قد يستغرق هذا بين 20 و 120 ثانية';

    try {
      const personBase64 = await fileToBase64(file);

      const res = await fetch('/api/tryon', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          model_image: personBase64,
          garment_image: selectedGarmentImage
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'فشل إنشاء المعاينة');
      }

      resultImage.src = data.result;
      resultBox.classList.remove('hidden');
      statusEl.textContent = 'تم إنشاء المعاينة بنجاح';
    } catch (err) {
      console.error(err);
      statusEl.textContent = 'حدث خطأ: ' + err.message;
    } finally {
      runBtn.disabled = false;
    }
  });
</script>
